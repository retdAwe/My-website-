<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cyuzuzo Media V3</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0a0a0a;
color:white;
}

.header{
display:flex;
align-items:center;
justify-content:space-between;
padding:15px;
background:#151515;
position:sticky;
top:0;
z-index:100;
}

.logo{
font-size:22px;
font-weight:bold;
color:#a855f7;
}

.search{
width:45%;
padding:10px;
border:none;
border-radius:25px;
}

.right{
display:flex;
align-items:center;
gap:10px;
}

.bell{
font-size:24px;
}

.profile{
width:45px;
height:45px;
border-radius:50%;
}

.menu{
display:flex;
justify-content:space-around;
padding:12px;
background:#1a1a1a;
}

.menu a{
color:white;
text-decoration:none;
font-size:14px;
}

.banner img{
width:100%;
height:220px;
object-fit:cover;
}

.title{
padding:15px;
font-size:28px;
text-align:center;
font-weight:bold;
}

.card{
background:#1a1a1a;
margin:15px;
border-radius:15px;
overflow:hidden;
}

.card img{
width:100%;
display:block;
}

.content{
padding:15px;
}

.views{
color:#999;
margin-top:5px;
}

.actions{
display:flex;
justify-content:space-around;
padding:12px;
border-top:1px solid #333;
}

.upload{
position:fixed;
right:20px;
bottom:20px;
width:65px;
height:65px;
border:none;
border-radius:50%;
background:#a855f7;
color:white;
font-size:35px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">

<div class="logo">CYUZUZO MEDIA</div>

<input class="search" placeholder="Search...">

<div class="right">
<div class="bell">🔔</div>

<img class="profile"
src="https://i.pravatar.cc/150?img=12">
</div>

</div>

<div class="menu">
<a href="#">🏠 Home</a>
<a href="#">🎬 Videos</a>
<a href="#">📰 News</a>
<a href="#">🤖 AI</a>
</div>

<div class="banner">
<img src="https://picsum.photos/900/400">
</div>

<div class="title">
🔥 Trending Videos
</div>

<div class="card">
<img src="https://picsum.photos/600/300?1">

<div class="content">
<h3>AI News Rwanda</h3>
<div class="views">12K Views</div>
</div>

<div class="actions">
<span>❤️ Like</span>
<span>💬 Comment</span>
<span>↗️ Share</span>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/600/300?2">

<div class="content">
<h3>Technology Africa</h3>
<div class="views">8K Views</div>
</div>

<div class="actions">
<span>❤️ Like</span>
<span>💬 Comment</span>
<span>↗️ Share</span>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/600/300?3">

<div class="content">
<h3>Latest Music Video</h3>
<div class="views">25K Views</div>
</div>

<div class="actions">
<span>❤️ Like</span>
<span>💬 Comment</span>
<span>↗️ Share</span>
</div>
</div>

<a href="upload.html">
<button class="upload">+</button>
</a>

</body>
</html>
