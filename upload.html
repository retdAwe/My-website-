<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cyuzuzo Media Upload</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0a0a0a;
color:white;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
}

.logo{
text-align:center;
font-size:30px;
font-weight:bold;
color:#a855f7;
margin-bottom:20px;
}

.card{
background:#1a1a1a;
padding:20px;
border-radius:20px;
box-shadow:0 0 15px rgba(168,85,247,.3);
}

.preview{
width:100%;
height:200px;
background:#222;
border:2px dashed #a855f7;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
font-size:50px;
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
background:#2a2a2a;
color:white;
}

textarea{
height:120px;
resize:none;
}

.upload-btn{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:15px;
background:#a855f7;
color:white;
font-size:18px;
font-weight:bold;
}

.upload-btn:hover{
opacity:0.9;
}

.info{
margin-top:15px;
text-align:center;
color:#999;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
CYUZUZO MEDIA
</div>

<div class="card">

<div class="preview">
🎬
</div>

<input type="text" placeholder="Video Title">

<textarea placeholder="Video Description"></textarea>

<input type="file" accept="video/*">

<button class="upload-btn">
⬆ Upload Video
</button>

<div class="info">
Share your creativity with the world 🌍
</div>

</div>

</div>

</body>
</html>
