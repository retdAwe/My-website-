<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cyuzuzo Media Profile</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0a0a0a;
color:white;
}

.header{
background:linear-gradient(135deg,#6d28d9,#a855f7);
padding:30px;
text-align:center;
}

.profile-img{
width:120px;
height:120px;
border-radius:50%;
border:4px solid white;
}

.name{
font-size:28px;
font-weight:bold;
margin-top:10px;
}

.username{
color:#ddd;
margin-top:5px;
}

.stats{
display:flex;
justify-content:space-around;
padding:20px;
background:#151515;
}

.stat{
text-align:center;
}

.number{
font-size:24px;
font-weight:bold;
color:#a855f7;
}

.label{
color:#999;
}

.bio{
padding:20px;
text-align:center;
}

.btns{
display:flex;
justify-content:center;
gap:10px;
padding-bottom:20px;
}

.btn{
padding:12px 20px;
border:none;
border-radius:10px;
background:#a855f7;
color:white;
font-weight:bold;
}

.section-title{
padding:15px;
font-size:22px;
font-weight:bold;
}

.video-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

.video-grid img{
width:100%;
border-radius:10px;
}
</style>
</head>

<body>

<div class="header">

<img class="profile-img"
src="https://i.pravatar.cc/300?img=15">

<div class="name">Beyonce Cyuzuzo</div>

<div class="username">@cyuzuzomedia</div>

</div>

<div class="stats">

<div class="stat">
<div class="number">120</div>
<div class="label">Videos</div>
</div>

<div class="stat">
<div class="number">15K</div>
<div class="label">Followers</div>
</div>

<div class="stat">
<div class="number">250K</div>
<div class="label">Likes</div>
</div>

</div>

<div class="bio">
Welcome to Cyuzuzo Media 🚀
Technology • AI • News • Entertainment
</div>

<div class="btns">
<button class="btn">Edit Profile</button>
<button class="btn">Share Profile</button>
</div>

<div class="section-title">
🎬 My Videos
</div>

<div class="video-grid">

<img src="https://picsum.photos/300/200?1">
<img src="https://picsum.photos/300/200?2">
<img src="https://picsum.photos/300/200?3">
<img src="https://picsum.photos/300/200?4">

</div>

</body>
</html>
