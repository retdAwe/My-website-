<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cyuzuzo Media Register</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0a0a0a,#2d0b52,#6d28d9);
color:white;
}

.container{
width:90%;
max-width:420px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
padding:30px;
border-radius:25px;
box-shadow:0 0 25px rgba(168,85,247,.4);
}

.logo{
text-align:center;
font-size:30px;
font-weight:bold;
color:#c084fc;
margin-bottom:10px;
}

.subtitle{
text-align:center;
margin-bottom:20px;
color:#ddd;
}

.avatar{
text-align:center;
margin-bottom:20px;
}

.avatar img{
width:100px;
height:100px;
border-radius:50%;
border:3px solid #a855f7;
}

input{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
background:#222;
color:white;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:12px;
background:#a855f7;
color:white;
font-size:18px;
font-weight:bold;
}

.login-link{
text-align:center;
margin-top:15px;
}

.login-link a{
color:#c084fc;
text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">CYUZUZO MEDIA</div>

<div class="subtitle">
Create Your Creator Account 🚀
</div>

<div class="avatar">
<img src="https://i.pravatar.cc/200?img=15">
</div>

<input type="text" placeholder="Full Name">

<input type="email" placeholder="Email Address">

<input type="password" placeholder="Password">

<input type="password" placeholder="Confirm Password">

<button>CREATE ACCOUNT</button>

<div class="login-link">
Already have an account?
<a href="login.html">Login</a>
</div>

</div>

</body>
</html>
